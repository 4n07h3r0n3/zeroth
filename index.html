<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нулевой шаблон</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="title">Шаблон сообщений<br>для нулевых уроков</h1>
    <div class="mid-flex">
        <form class="parameters">
            <div class="param-wrapper">
                Ваше имя
                <input class="teacher-name" type="text" placeholder="Максим">
            </div>
            <div class="param-wrapper">
                Имя ученика<br>(родительный падеж)
                <input class="student-name" type="text" placeholder="Ильи">
            </div>
            <div class="param-wrapper">
                Время начала урока
                <input class="lesson-time" type="time" value="12:00">
            </div>
            <div class="param-wrapper">
                Ваша ссылка на Контур.Толк
                <input class="ktalk-link" type="url" placeholder="https://kvantastica.ktalk.ru/sotnikov_maksim">
            </div>
            <div class="param-wrapper">
                Курс
                <select class="course">
                    <option value="jun">Junior</option>
                    <option value="mid">Middle</option>
                    <option value="hi">High</option>
                    <option value="hiexp">High Expert</option>
                    <option value="hisup">High Super</option>
                </select>
            </div>
        </form>
        <div class="result">
            <div class="result-title-wrapper">
                <h2 class="uncopyable">Приветственное</h2>
                <img class="hello-copy" src="https://cdn-icons-png.flaticon.com/256/88/88026.png" alt="COPY">
            </div>
            <textarea readonly class="result-text hello"></textarea>
        </div>
        <div class="result">
            <div class="result-title-wrapper">
                <h2 class="result-title uncopyable">Прощальное</h2>
                <img class="bye-copy" src="https://cdn-icons-png.flaticon.com/256/88/88026.png" alt="COPY">
            </div>
            <textarea readonly class="result-text bye"></textarea>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
